    <link rel="stylesheet" href="converter.css">
</head>

<body>

        <h4 style="font-size: 30px;">Конвертер валют</h4>

            <button class="convert-btn">⬇</button>
            <ul id="menu-valut">
                <li><a  id ="dollar">$</a></li>
                <li><a  id ="euro">€</a></li>
                <li><a  id ="pounds">£</a></li>
            </ul>
        </div>
        <h5 style="font-size: 60px; margin-bottom: 20px;" >↕</h5>
        <label id="lab"></label>
        <button id="convert">Конвертировать</button>
    </div>
</body>

</html>
